jobs:
- job: 'TestLinux'
  pool:
    vmImage: 'ubuntu-latest'
  strategy:
    matrix:
      Python38-Linux:
        python.version: '3.8'
    maxParallel: 3
  steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: '$(python.version)'
      architecture: 'x64'
  - script: sudo apt-get update
    displayName: 'AptGet Update'
  - script: sudo apt-get install -y libomp-8-dev
    displayName: 'Install omp'
  - script: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 10
          ls /usr/bin/llvm*
          export LLVM_CONFIG=/usr/bin/llvm-config-10
    displayName: 'Install llvmlite'
  - script: pip install --upgrade pip setuptools wheel
    displayName: 'Install tools'
  - script: |
          export LLVM_CONFIG=/usr/bin/llvm-config-10
          pip install -r requirements.txt
    displayName: 'Install Requirements'
  - script: python tools\ci_build\build.py --build_dir dist --build_shared_lib --config Release --skip_tests --enable_training
    displayName: 'Install onnxruntime'
  - task: PublishPipelineArtifact@0
    inputs:
      artifactName: 'zip-linux-$(python.version)'
      patterns: '*.so'
      targetPath: 'dist'

- job: 'TestMac'
  pool:
    vmImage: 'macOS-latest'
  strategy:
    matrix:
      Python39-MacOs:
        python.version: '3.8'
    maxParallel: 3
  steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: '$(python.version)'
      architecture: 'x64'
  - script: gcc --version
    displayName: 'gcc version'
  - script: brew update
    displayName: 'brew update'
  - script: export
    displayName: 'export'
  - script: gcc --version
    displayName: 'gcc version'
  - script: brew install libomp
    displayName: 'Install omp'
  - script: brew install cairo pango gdk-pixbuf libffi
    displayName: 'Install cairo pango gdk-pixbuf libffi'
  - script: python tools\ci_build\build.py --build_dir dist --build_shared_lib --config Release --skip_tests --enable_training
    displayName: 'Install onnxruntime'
  - task: PublishPipelineArtifact@0
    inputs:
      artifactName: 'zip-macos-$(python.version)'
      patterns: '*.so'
      targetPath: 'dist'

- job: 'TestWindows'
  pool:
    vmImage: 'windows-latest'
  strategy:
    matrix:
      Python38-Windows:
        python.version: '3.8'
    maxParallel: 3
  steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: '$(python.version)'
      architecture: 'x64'
  - script: python -m pip install --upgrade pip setuptools wheel
    displayName: 'Install tools'
  - script: python tools\ci_build\build.py --build_dir dist --build_shared_lib --config Release --skip_tests --cmake_generator="Visual Studio 16 2019" --enable_training
    displayName: 'Install onnxruntime'
  - task: PublishPipelineArtifact@0
    inputs:
      artifactName: 'zip-windows-$(python.version)'
      patterns: '*.dll'
      targetPath: 'dist'
